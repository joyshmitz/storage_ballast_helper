name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings
  # TUI feature depends on local-path frankentui crates unavailable in CI.
  # Build with all features except tui.
  CI_FEATURES: --no-default-features --features cli,daemon,sqlite

jobs:
  check:
    name: Format + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Require docs updates for user-facing changes
        if: github.event_name == 'pull_request'
        run: bash scripts/ci_docs_update_check.sh
      - name: Strip local-only TUI path deps
        run: |
          # ftui crates use /dp/frankentui/ paths unavailable in CI
          sed -i '/^ftui.*=.*{.*path.*=.*"\/dp\//d' Cargo.toml
          sed -i 's/^tui = \["dep:ftui.*\]/tui = []/' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Run clippy
        # --lib --bin avoids compiling test files that import tui:: types
        run: cargo clippy $CI_FEATURES --lib --bin sbh -- -D warnings

  homebrew-formula:
    name: Homebrew Formula Validation
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Check formula syntax
        shell: bash
        run: ruby -c packaging/homebrew/Formula/sbh.rb 2>&1 | tee homebrew-formula-syntax-output.txt
      - name: Check formula style
        shell: bash
        run: brew style packaging/homebrew/Formula/sbh.rb 2>&1 | tee homebrew-formula-style-output.txt
      - name: Validate generated tap formula
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p generated-homebrew/Formula
          cp packaging/homebrew/Formula/sbh.rb generated-homebrew/Formula/sbh.rb
          version="9.8.7"
          arm_sha="0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          intel_sha="fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210"

          VERSION="${version}" ARM_SHA="${arm_sha}" INTEL_SHA="${intel_sha}" \
            perl -0pi -e '
              s/version "[^"]+"/version "$ENV{VERSION}"/;
              s/      # REPLACE_WITH_AARCH64_APPLE_DARWIN_SHA256\n      sha256 "[0-9a-f]{64}"/      sha256 "$ENV{ARM_SHA}"/g;
              s/      # REPLACE_WITH_X86_64_APPLE_DARWIN_SHA256\n      sha256 "[0-9a-f]{64}"/      sha256 "$ENV{INTEL_SHA}"/g;
            ' generated-homebrew/Formula/sbh.rb

          if grep -q 'REPLACE_WITH_' generated-homebrew/Formula/sbh.rb; then
            echo "::error::generated Homebrew formula retained checksum markers"
            exit 1
          fi
          grep -q "version \"${version}\"" generated-homebrew/Formula/sbh.rb
          grep -q "sha256 \"${arm_sha}\"" generated-homebrew/Formula/sbh.rb
          grep -q "sha256 \"${intel_sha}\"" generated-homebrew/Formula/sbh.rb
          ruby -c generated-homebrew/Formula/sbh.rb 2>&1 | tee homebrew-generated-formula-syntax-output.txt
          brew style generated-homebrew/Formula/sbh.rb 2>&1 | tee homebrew-generated-formula-style-output.txt
      - name: Upload Homebrew formula logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: homebrew-formula-logs
          path: |
            homebrew-formula-syntax-output.txt
            homebrew-formula-style-output.txt
            homebrew-generated-formula-syntax-output.txt
            homebrew-generated-formula-style-output.txt
            generated-homebrew/Formula/sbh.rb
          retention-days: 14

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Strip local-only TUI path deps
        run: |
          # ftui crates use /dp/frankentui/ paths unavailable in CI
          sed -i '/^ftui.*=.*{.*path.*=.*"\/dp\//d' Cargo.toml
          sed -i 's/^tui = \["dep:ftui.*\]/tui = []/' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unit tests
        run: cargo test $CI_FEATURES --lib -- --nocapture 2>&1 | tee unit-test-output.txt
      - name: Run binary tests
        run: cargo test $CI_FEATURES --bin sbh -- --nocapture 2>&1 | tee bin-test-output.txt
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: unit-test-logs
          path: |
            unit-test-output.txt
            bin-test-output.txt
          retention-days: 14

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Strip local-only TUI path deps
        run: |
          # ftui crates use /dp/frankentui/ paths unavailable in CI
          sed -i '/^ftui.*=.*{.*path.*=.*"\/dp\//d' Cargo.toml
          sed -i 's/^tui = \["dep:ftui.*\]/tui = []/' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run integration tests
        run: cargo test $CI_FEATURES --test integration_tests -- --nocapture 2>&1 | tee integration-output.txt
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: integration-test-logs
          path: integration-output.txt
          retention-days: 14

  linux-arm64:
    name: Linux arm64 Tests
    runs-on: ubuntu-24.04-arm
    needs: check
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Strip local-only TUI path deps
        run: |
          # ftui crates use /dp/frankentui/ paths unavailable in CI
          sed -i '/^ftui.*=.*{.*path.*=.*"\/dp\//d' Cargo.toml
          sed -i 's/^tui = \["dep:ftui.*\]/tui = []/' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-arm64
      - name: Verify runner identity
        run: |
          set -euo pipefail
          {
            echo "runner_os=${{ runner.os }}"
            echo "matrix_os=ubuntu-24.04-arm"
            echo "expected_arch=aarch64"
            echo "uname_s=$(uname -s)"
            echo "uname_m=$(uname -m)"
            rustc -vV
            cargo --version
          } | tee linux-arm64-runner-info.txt
          test "$(uname -m)" = "aarch64"
      - name: Run unit tests
        run: |
          cargo test $CI_FEATURES --lib -- --nocapture 2>&1 | tee linux-arm64-unit-lib-output.txt
          cargo test $CI_FEATURES --bin sbh -- --nocapture 2>&1 | tee linux-arm64-unit-bin-output.txt
      - name: Run integration tests
        run: cargo test $CI_FEATURES --test integration_tests -- --nocapture 2>&1 | tee linux-arm64-integration-output.txt
      - name: Build release binary
        run: cargo build $CI_FEATURES --release 2>&1 | tee linux-arm64-release-build-output.txt
      - name: Run selected CLI smoke checks
        run: |
          set -euo pipefail
          bin="./target/release/sbh"
          test -x "${bin}"
          {
            echo "case=help"
            "${bin}" --help
            echo "case=version-verbose"
            "${bin}" version --verbose
            echo "case=json-version"
            "${bin}" --json version
            echo "case=config-validate"
            "${bin}" config validate
            echo "case=json-status"
            "${bin}" --json status
          } 2>&1 | tee linux-arm64-smoke-output.txt
      - name: Upload Linux arm64 logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: linux-arm64-logs
          path: |
            linux-arm64-runner-info.txt
            linux-arm64-unit-lib-output.txt
            linux-arm64-unit-bin-output.txt
            linux-arm64-integration-output.txt
            linux-arm64-release-build-output.txt
            linux-arm64-smoke-output.txt
          retention-days: 14

  decision-plane:
    name: Decision Plane Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Strip local-only TUI path deps
        run: |
          # ftui crates use /dp/frankentui/ paths unavailable in CI
          sed -i '/^ftui.*=.*{.*path.*=.*"\/dp\//d' Cargo.toml
          sed -i 's/^tui = \["dep:ftui.*\]/tui = []/' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run proof harness
        run: cargo test $CI_FEATURES --test proof_harness -- --nocapture 2>&1 | tee proof-harness-output.txt
      - name: Run decision plane e2e
        run: cargo test $CI_FEATURES --test decision_plane_e2e -- --nocapture 2>&1 | tee decision-plane-e2e-output.txt
      - name: Upload decision plane logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: decision-plane-logs
          path: |
            proof-harness-output.txt
            decision-plane-e2e-output.txt
          retention-days: 30

  dashboard:
    name: Dashboard Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Strip local-only TUI path deps
        run: |
          # ftui crates use /dp/frankentui/ paths unavailable in CI
          sed -i '/^ftui.*=.*{.*path.*=.*"\/dp\//d' Cargo.toml
          sed -i 's/^tui = \["dep:ftui.*\]/tui = []/' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # TUI tests skipped — tui feature requires local-path frankentui crates
      # unavailable in CI. TUI is tested locally only.
      - name: Dashboard integration tests
        run: cargo test $CI_FEATURES --test dashboard_integration_tests -- --nocapture 2>&1 | tee dashboard-integration-output.txt
      # fallback_verification requires tui feature (imports tui:: types); skipped in CI.
      # Tested locally with full feature set.
      - name: Upload dashboard test logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dashboard-test-logs
          path: |
            dashboard-integration-output.txt
          retention-days: 30

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Strip local-only TUI path deps
        run: |
          # ftui crates use /dp/frankentui/ paths unavailable in CI
          sed -i '/^ftui.*=.*{.*path.*=.*"\/dp\//d' Cargo.toml
          sed -i 's/^tui = \["dep:ftui.*\]/tui = []/' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build $CI_FEATURES --release
      - name: Run E2E test suite
        run: |
          chmod +x scripts/e2e_test.sh
          ./scripts/e2e_test.sh 2>&1 | tee e2e-output.txt
        env:
          SBH_E2E_BIN: ./target/release/sbh
      - name: Upload E2E logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: e2e-test-logs
          path: |
            e2e-output.txt
            /tmp/sbh_e2e_*/
          retention-days: 14

  macos-platform:
    name: macOS Platform Tests (${{ matrix.runner }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-13 was retired by GitHub; macos-15-intel is the current
          # standard Intel runner label. macos-latest is the arm64 runner.
          - runner: apple-silicon
            os: macos-latest
            expected_arch: arm64
          - runner: intel
            os: macos-15-intel
            expected_arch: x86_64
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Strip local-only TUI path deps
        shell: bash
        run: |
          # ftui crates use /dp/frankentui/ paths unavailable in CI.
          # Use perl instead of sed -i so this step is portable across
          # macOS/BSD and GNU userlands.
          perl -0pi -e 's/^ftui.*=.*\{.*path.*=.*"\/dp\/.*\n//mg; s/^tui = \["dep:ftui.*\]/tui = []/m' Cargo.toml
          grep -q '^tui = \[\]' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-platform-${{ matrix.os }}
      - name: Verify runner identity
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "runner_os=${{ runner.os }}"
            echo "matrix_os=${{ matrix.os }}"
            echo "expected_arch=${{ matrix.expected_arch }}"
            echo "uname_s=$(uname -s)"
            echo "uname_m=$(uname -m)"
            rustc -vV
            cargo --version
          } | tee macos-runner-info.txt
          test "$(uname -m)" = "${{ matrix.expected_arch }}"
      - name: Verify macOS developer tools
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "xcode_select_path=$(xcode-select -p)"
            cc_path="$(xcrun --find cc)"
            ar_path="$(xcrun --find ar)"
            echo "cc_path=${cc_path}"
            echo "ar_path=${ar_path}"
            echo "cc_version:"
            "${cc_path}" --version
            echo "ar_identity:"
            if "${ar_path}" -V; then
              :
            elif "${ar_path}" --version; then
              :
            else
              echo "ar responded to neither -V nor --version; xcrun path lookup succeeded"
            fi
          } 2>&1 | tee macos-toolchain-output.txt
      - name: Run unit tests
        shell: bash
        run: |
          cargo test $CI_FEATURES --lib -- --nocapture 2>&1 | tee macos-unit-lib-output.txt
          cargo test $CI_FEATURES --bin sbh -- --nocapture 2>&1 | tee macos-unit-bin-output.txt
      - name: Run integration tests
        shell: bash
        run: cargo test $CI_FEATURES --test integration_tests -- --nocapture 2>&1 | tee macos-integration-output.txt
      - name: Build release binary
        shell: bash
        run: cargo build $CI_FEATURES --release 2>&1 | tee macos-release-build-output.txt
      - name: Run idle energy impact budget
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          bin="${PWD}/target/release/sbh"
          test -x "${bin}"
          SBH_RUN_ENERGY_IMPACT_TEST=1 \
          SBH_ENERGY_TEST_BIN="${bin}" \
            cargo test $CI_FEATURES --test integration_tests \
              macos_foreground_daemon_idle_energy_budget \
              -- --nocapture 2>&1 | tee macos-energy-impact-test-output.txt
      - name: Ad-hoc sign and verify release binary
        shell: bash
        run: |
          set -euo pipefail
          bin="./target/release/sbh"
          entitlements=".github/macos/sbh.entitlements.plist"
          test -x "${bin}"
          plutil -lint "${entitlements}" 2>&1 | tee macos-entitlements-lint-output.txt
          {
            codesign --force --sign - --options runtime --timestamp=none --entitlements "${entitlements}" "${bin}"
            codesign --verify --strict --verbose=2 "${bin}"
            codesign -dv "${bin}"
            codesign --display --verbose=4 "${bin}"
          } 2>&1 | tee macos-codesign-output.txt
          codesign --display --entitlements :- "${bin}" > macos-codesign-entitlements.plist
          plutil -lint macos-codesign-entitlements.plist 2>&1 | tee macos-codesign-entitlements-lint-output.txt
          if grep -E 'com\.apple\.security\.(cs\.allow-jit|cs\.disable-library-validation|network\.server|device\.camera|device\.microphone)' macos-codesign-entitlements.plist; then
            echo "::error::sbh release binary was signed with a forbidden entitlement"
            exit 1
          fi
      - name: Exercise Homebrew formula install from current signed binary
        shell: bash
        run: |
          set -euo pipefail
          bin="${PWD}/target/release/sbh"
          test -x "${bin}"
          mkdir -p macos-homebrew-archive macos-homebrew-formula/Formula
          cp "${bin}" macos-homebrew-archive/sbh
          archive="${PWD}/macos-homebrew-archive/sbh-ci-${{ matrix.runner }}.tar.xz"
          formula_path="${PWD}/macos-homebrew-formula/Formula/sbh-ci.rb"
          tap_name="sbh/local-ci"
          tap_root="$(brew --repository)/Library/Taps/sbh/homebrew-local-ci"
          tap_formula_path="${tap_root}/Formula/sbh-ci.rb"
          tar -C macos-homebrew-archive -cJf "${archive}" sbh
          archive_sha="$(shasum -a 256 "${archive}" | awk '{print $1}')"
          archive_url="file://${archive}"
          export ARCHIVE_SHA="${archive_sha}"
          export ARCHIVE_URL="${archive_url}"

          ruby - <<'RUBY'
          formula = File.read("packaging/homebrew/Formula/sbh.rb")
          formula = formula.sub("class Sbh < Formula", "class SbhCi < Formula")
          formula = formula.gsub(
            %r{url "https://github\.com/Dicklesworthstone/storage_ballast_helper/releases/download/v#\{version\}/" \\\n\s+"sbh-v#\{version\}-(?:aarch64|x86_64)-apple-darwin\.tar\.xz"},
            %(url "#{ENV.fetch("ARCHIVE_URL")}"),
          )
          formula = formula.gsub(
            /# REPLACE_WITH_[A-Z0-9_]+_SHA256\n\s+sha256 "[0-9a-f]{64}"/,
            %(sha256 "#{ENV.fetch("ARCHIVE_SHA")}"),
          )
          File.write("macos-homebrew-formula/Formula/sbh-ci.rb", formula)
          RUBY

          brew tap-new --no-git "${tap_name}" 2>&1 | tee macos-homebrew-tap-new-output.txt
          cp "${formula_path}" "${tap_formula_path}"
          ruby -c "${formula_path}" 2>&1 | tee macos-homebrew-formula-syntax-output.txt
          ruby -c "${tap_formula_path}" 2>&1 | tee -a macos-homebrew-formula-syntax-output.txt
          brew install --formula --build-from-source --skip-link "${tap_name}/sbh-ci" 2>&1 | tee macos-homebrew-install-output.txt
          brew test --force "${tap_name}/sbh-ci" 2>&1 | tee macos-homebrew-test-output.txt
      - name: Capture release doctor diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          bin="./target/release/sbh"
          if [ ! -x "${bin}" ]; then
            echo "release binary is not available" | tee macos-release-doctor-status.txt
            exit 0
          fi

          set +e
          "${bin}" --json doctor --release > macos-release-doctor-output.json 2> macos-release-doctor-stderr.txt
          doctor_status=$?
          set -e
          echo "exit_status=${doctor_status}" | tee macos-release-doctor-status.txt

          python3 - <<'PY'
          import json
          import pathlib
          import sys

          output = pathlib.Path("macos-release-doctor-output.json")
          try:
              report = json.loads(output.read_text(encoding="utf-8"))
          except Exception as error:
              print(f"::error::release doctor did not emit valid JSON: {error}")
              sys.exit(1)

          required_top = {
              "ok",
              "passed",
              "warnings",
              "failed",
              "repository",
              "notary_profile",
              "required_github_secrets",
              "checks",
              "setup_steps",
          }
          missing_top = sorted(required_top.difference(report))
          if missing_top:
              print(f"::error::release doctor JSON missing keys: {missing_top}")
              sys.exit(1)

          if not isinstance(report["checks"], list):
              print("::error::release doctor JSON checks must be an array")
              sys.exit(1)

          checks = {}
          duplicate_check_ids = set()
          statuses = []
          for index, check in enumerate(report["checks"]):
              if not isinstance(check, dict):
                  print(f"::error::release doctor JSON check at index {index} is not an object")
                  sys.exit(1)

              check_id = check.get("id")
              if not isinstance(check_id, str) or not check_id:
                  print(f"::error::release doctor JSON check at index {index} has invalid id")
                  sys.exit(1)

              status = check.get("status")
              if not isinstance(status, str) or not status:
                  print(f"::error::release doctor JSON check {check_id} has invalid status")
                  sys.exit(1)

              if check_id in checks:
                  duplicate_check_ids.add(check_id)
              checks[check_id] = status
              statuses.append(status)

          if duplicate_check_ids:
              print(f"::error::release doctor JSON has duplicate checks: {sorted(duplicate_check_ids)}")
              sys.exit(1)

          required_checks = [
              "release.developer_id_identity",
              "release.notary_profile",
              "release.github_secrets",
              "release.homebrew_tap",
          ]
          missing_checks = [check for check in required_checks if check not in checks]
          if missing_checks:
              print(f"::error::release doctor JSON missing checks: {missing_checks}")
              sys.exit(1)

          allowed_statuses = {"PASS", "WARN", "FAIL"}
          unknown_statuses = sorted({status for status in statuses if status not in allowed_statuses})
          if unknown_statuses:
              print(f"::error::release doctor JSON has unknown check statuses: {unknown_statuses}")
              sys.exit(1)

          expected_counts = {
              "passed": statuses.count("PASS"),
              "warnings": statuses.count("WARN"),
              "failed": statuses.count("FAIL"),
          }
          for key, expected in expected_counts.items():
              if report.get(key) != expected:
                  print(
                      f"::error::release doctor JSON {key}={report.get(key)!r} "
                      f"does not match check count {expected}"
                  )
                  sys.exit(1)

          expected_ok = expected_counts["failed"] == 0 and expected_counts["warnings"] == 0
          if report.get("ok") != expected_ok:
              print(
                  f"::error::release doctor JSON ok={report.get('ok')!r} "
                  f"does not match failed/warnings counts"
              )
              sys.exit(1)

          pathlib.Path("macos-release-doctor-summary.txt").write_text(
              "\n".join(
                  [
                      f"ok={report['ok']}",
                      f"passed={report['passed']}",
                      f"warnings={report['warnings']}",
                      f"failed={report['failed']}",
                  ]
                  + [f"{check}={checks[check]}" for check in required_checks]
              )
              + "\n",
              encoding="utf-8",
          )
          PY
      - name: Prepare macOS binary diagnostic artifact
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          bin="./target/release/sbh"
          mkdir -p macos-release-artifact
          if [ ! -x "${bin}" ]; then
            echo "release binary is not available" | tee macos-release-artifact/README.txt
            exit 0
          fi
          cp "${bin}" "macos-release-artifact/sbh-${{ matrix.runner }}"
          shasum -a 256 "macos-release-artifact/sbh-${{ matrix.runner }}" \
            | tee "macos-release-artifact/sbh-${{ matrix.runner }}.sha256"
      - name: Exercise launchd user service lifecycle
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          bin="${PWD}/target/release/sbh"
          test -x "${bin}"

          SBH_RUN_LAUNCHD_LIFECYCLE_TEST=1 \
          SBH_LAUNCHD_TEST_BIN="${bin}" \
            cargo test $CI_FEATURES --test integration_tests \
              macos_launchd_user_service_lifecycle_bootstrap_kickstart_bootout \
              -- --nocapture 2>&1 | tee macos-launchd-lifecycle-test-output.txt
      - name: Run selected E2E smoke checks
        shell: bash
        run: |
          set -euo pipefail
          bin="./target/release/sbh"
          test -x "${bin}"
          {
            echo "case=help"
            "${bin}" --help
            echo "case=version-verbose"
            "${bin}" version --verbose
            echo "case=json-version"
            "${bin}" --json version
            echo "case=config-validate"
            "${bin}" config validate
            echo "case=json-status"
            "${bin}" --json status
            echo "case=completions-zsh"
            "${bin}" completions zsh > sbh-completions.zsh
            test -s sbh-completions.zsh
          } 2>&1 | tee macos-e2e-smoke-output.txt
      - name: Fail on unsupported PAL placeholders
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          logs=(macos-*.txt)
          if [ "${#logs[@]}" -eq 0 ]; then
            echo "No macOS platform logs were produced."
            exit 0
          fi
          if grep -E -n 'SBH-1101|unsupported platform|PAL method .* is not implemented|not implemented on|PalError::NotImplemented|only Linux is currently implemented' "${logs[@]}"; then
            echo "::error::macOS platform logs contain unsupported-platform or PAL-not-implemented output"
            exit 1
          fi
      - name: Upload macOS platform logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: macos-platform-logs-${{ matrix.os }}
          path: |
            macos-runner-info.txt
            macos-toolchain-output.txt
            macos-unit-lib-output.txt
            macos-unit-bin-output.txt
            macos-integration-output.txt
            macos-release-build-output.txt
            macos-homebrew-*.txt
            macos-homebrew-formula/Formula/sbh-ci.rb
            macos-energy-*.txt
            macos-codesign-output.txt
            macos-codesign-entitlements.plist
            macos-*entitlements*-output.txt
            macos-release-doctor-*.json
            macos-release-doctor-*.txt
            macos-launchd-*.txt
            macos-launchd-*.jsonl
            macos-e2e-smoke-output.txt
            sbh-completions.zsh
          retention-days: 14
      - name: Upload macOS binary diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: macos-release-binary-${{ matrix.os }}
          path: macos-release-artifact/
          retention-days: 14

  macos-coverage:
    name: macOS Coverage
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      COVERAGE_DELTA_FLOOR: "-2.0"
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v6.0.2
        with:
          path: current
      - name: Checkout PR base ref
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Strip local-only TUI path deps
        shell: bash
        run: |
          set -euo pipefail
          sanitize_ci_cargo() {
            local dir="$1"
            perl -0pi -e 's/^ftui.*=.*\{.*path.*=.*"\/dp\/.*\n//mg; s/^tui = \["dep:ftui.*\]/tui = []/m' "${dir}/Cargo.toml"
            grep -q '^tui = \[\]' "${dir}/Cargo.toml"
          }
          sanitize_ci_cargo current
          if [ -d base ]; then
            sanitize_ci_cargo base
          fi
      - name: Generate current macOS coverage
        shell: bash
        working-directory: current
        run: |
          set -euo pipefail
          mkdir -p ../coverage
          cargo llvm-cov $CI_FEATURES --lib --bin sbh --test integration_tests --json --output-path ../coverage/current-coverage.json 2>&1 | tee ../coverage/current-output.txt
          cargo llvm-cov report --lcov --output-path ../coverage/current-lcov.info
      - name: Generate base macOS coverage
        if: github.event_name == 'pull_request'
        shell: bash
        working-directory: base
        run: |
          set -euo pipefail
          cargo llvm-cov $CI_FEATURES --lib --bin sbh --test integration_tests --json --output-path ../coverage/base-coverage.json 2>&1 | tee ../coverage/base-output.txt
      - name: Enforce PR coverage delta
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import sys

          def line_percent(path: str) -> float:
              with open(path, "r", encoding="utf-8") as handle:
                  report = json.load(handle)
              return float(report["data"][0]["totals"]["lines"]["percent"])

          current = line_percent("coverage/current-coverage.json")
          summary = {
              "current_lines_percent": current,
              "delta_floor_percent": float(os.environ["COVERAGE_DELTA_FLOOR"]),
          }
          failed = False
          base_path = pathlib.Path("coverage/base-coverage.json")
          if base_path.exists():
              base = line_percent(str(base_path))
              delta = current - base
              summary["base_lines_percent"] = base
              summary["delta_lines_percent"] = delta
              print(f"macOS coverage current={current:.2f}% base={base:.2f}% delta={delta:.2f}%")
              if delta < summary["delta_floor_percent"]:
                  print(
                      f"::error::macOS line coverage dropped by {delta:.2f} percentage points "
                      f"(allowed floor {summary['delta_floor_percent']:.2f})"
                  )
                  failed = True
          else:
              print(f"macOS coverage current={current:.2f}%; no PR base coverage available")

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as handle:
                  handle.write("### macOS coverage\n\n")
                  handle.write(f"- Current line coverage: {current:.2f}%\n")
                  if "base_lines_percent" in summary:
                      handle.write(f"- Base line coverage: {summary['base_lines_percent']:.2f}%\n")
                      handle.write(f"- Delta: {summary['delta_lines_percent']:.2f} percentage points\n")
                      handle.write(f"- Allowed floor: {summary['delta_floor_percent']:.2f} percentage points\n")

          pathlib.Path("coverage/coverage-summary.json").write_text(
              json.dumps(summary, indent=2) + "\n",
              encoding="utf-8",
          )
          if failed:
              sys.exit(1)
          PY
      - name: Upload macOS coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: macos-coverage
          path: coverage/
          retention-days: 30

  macos-benchmarks:
    name: macOS Performance Budgets
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      BENCH_REGRESSION_LIMIT: "20.0"
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v6.0.2
        with:
          path: current
      - name: Checkout PR base ref
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
      - uses: dtolnay/rust-toolchain@stable
      - name: Strip local-only TUI path deps
        shell: bash
        run: |
          set -euo pipefail
          sanitize_ci_cargo() {
            local dir="$1"
            perl -0pi -e 's/^ftui.*=.*\{.*path.*=.*"\/dp\/.*\n//mg; s/^tui = \["dep:ftui.*\]/tui = []/m' "${dir}/Cargo.toml"
            grep -q '^tui = \[\]' "${dir}/Cargo.toml"
          }
          sanitize_ci_cargo current
          if [ -d base ]; then
            sanitize_ci_cargo base
          fi
      - name: Generate current macOS benchmark summary
        shell: bash
        working-directory: current
        run: |
          set -euo pipefail
          mkdir -p ../bench
          SBH_BENCH_SUMMARY=../bench/current-summary.json \
            cargo bench $CI_FEATURES --bench macos_performance -- --sample-size 10 --warm-up-time 1 --measurement-time 2 \
            2>&1 | tee ../bench/current-output.txt
      - name: Generate base macOS benchmark summary
        if: github.event_name == 'pull_request'
        shell: bash
        working-directory: base
        run: |
          set -euo pipefail
          if [ ! -f benches/macos_performance.rs ]; then
            echo "Base ref has no macos_performance bench; skipping base comparison." | tee ../bench/base-output.txt
            exit 0
          fi
          SBH_BENCH_SUMMARY=../bench/base-summary.json \
            cargo bench $CI_FEATURES --bench macos_performance -- --sample-size 10 --warm-up-time 1 --measurement-time 2 \
            2>&1 | tee ../bench/base-output.txt
      - name: Enforce benchmark budgets and PR regression limit
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import sys

          metrics = [
              ("daemon_poll_tick_avg_ms", "daemon poll tick", "daemon_poll_tick_budget_ms"),
              ("pal_surface_avg_ms", "PAL surface pass", "pal_surface_budget_ms"),
          ]

          def load_summary(path: str) -> dict:
              with open(path, "r", encoding="utf-8") as handle:
                  return json.load(handle)

          current = load_summary("bench/current-summary.json")
          regression_limit = float(os.environ["BENCH_REGRESSION_LIMIT"])
          output = {
              "regression_limit_percent": regression_limit,
              "current": current,
              "comparisons": [],
          }
          failed = False

          for key, label, budget_key in metrics:
              actual = float(current[key])
              budget = float(current[budget_key])
              print(f"{label}: current={actual:.3f} ms budget={budget:.3f} ms")
              if actual > budget:
                  print(f"::error::{label} exceeded budget: {actual:.3f} ms > {budget:.3f} ms")
                  failed = True

          base_path = pathlib.Path("bench/base-summary.json")
          if base_path.exists():
              base = load_summary(str(base_path))
              output["base"] = base
              for key, label, _budget_key in metrics:
                  current_value = float(current[key])
                  base_value = float(base[key])
                  if base_value <= 0.0:
                      print(f"::warning::{label} base value is non-positive; skipping regression comparison")
                      continue
                  delta_percent = ((current_value - base_value) / base_value) * 100.0
                  comparison = {
                      "metric": key,
                      "label": label,
                      "current_ms": current_value,
                      "base_ms": base_value,
                      "delta_percent": delta_percent,
                  }
                  output["comparisons"].append(comparison)
                  print(
                      f"{label}: base={base_value:.3f} ms current={current_value:.3f} ms "
                      f"delta={delta_percent:.2f}%"
                  )
                  if delta_percent > regression_limit:
                      print(
                          f"::error::{label} regressed by {delta_percent:.2f}% "
                          f"(limit {regression_limit:.2f}%)"
                      )
                      failed = True
          else:
              print("No base benchmark summary available; enforcing hard budgets only.")

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as handle:
                  handle.write("### macOS performance budgets\n\n")
                  for key, label, budget_key in metrics:
                      handle.write(
                          f"- {label}: {float(current[key]):.3f} ms "
                          f"(budget {float(current[budget_key]):.3f} ms)\n"
                      )
                  if output["comparisons"]:
                      handle.write(f"- Regression limit: {regression_limit:.2f}%\n")
                      for comparison in output["comparisons"]:
                          handle.write(
                              f"- {comparison['label']} delta: "
                              f"{comparison['delta_percent']:.2f}%\n"
                          )

          pathlib.Path("bench/benchmark-summary.json").write_text(
              json.dumps(output, indent=2) + "\n",
              encoding="utf-8",
          )
          if failed:
              sys.exit(1)
          PY
      - name: Upload macOS benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: macos-benchmarks
          path: bench/
          retention-days: 30

  stress:
    name: Stress Tests
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Strip local-only TUI path deps
        run: |
          # ftui crates use /dp/frankentui/ paths unavailable in CI
          sed -i '/^ftui.*=.*{.*path.*=.*"\/dp\//d' Cargo.toml
          sed -i 's/^tui = \["dep:ftui.*\]/tui = []/' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run stress tests
        run: cargo test $CI_FEATURES --test stress_tests -- --nocapture 2>&1 | tee stress-output.txt
      - name: Upload stress logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: stress-test-logs
          path: stress-output.txt
          retention-days: 14

  artifact-contract:
    name: Artifact Contract Validation
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Strip local-only TUI path deps
        run: |
          # ftui crates use /dp/frankentui/ paths unavailable in CI
          sed -i '/^ftui.*=.*{.*path.*=.*"\/dp\//d' Cargo.toml
          sed -i 's/^tui = \["dep:ftui.*\]/tui = []/' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run artifact contract tests
        run: |
          cargo test $CI_FEATURES --lib -- cli::tests::ci_release_targets --nocapture
          cargo test $CI_FEATURES --lib -- cli::tests::builds_expected_asset_names --nocapture
          cargo test $CI_FEATURES --lib -- cli::tests::validates_release_asset_contract --nocapture
      - name: Validate archive naming matches contract
        run: |
          cargo build $CI_FEATURES --release
          # Build archive using contract naming and verify structure.
          TARGET=$(rustc -vV | grep host | awk '{print $2}')
          VERSION="v$(grep '^version = ' Cargo.toml | head -n 1 | sed 's/version = "\(.*\)"/\1/')"
          ARCHIVE="sbh-${VERSION}-${TARGET}.tar.xz"
          cd target/release && tar cJf "../../${ARCHIVE}" sbh && cd ../..
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          # Verify archive contains the binary.
          tar -tJf "${ARCHIVE}" | grep -q "^sbh$"
          # Verify checksum file is valid.
          sha256sum -c "${ARCHIVE}.sha256"
          echo "Artifact contract validated: ${ARCHIVE}"

  provenance:
    name: Provenance Metadata
    runs-on: ubuntu-latest
    needs: [homebrew-formula, unit, integration, linux-arm64, decision-plane, dashboard, e2e, macos-platform, macos-coverage, macos-benchmarks, stress, artifact-contract]
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Strip local-only TUI path deps
        run: |
          # ftui crates use /dp/frankentui/ paths unavailable in CI
          sed -i '/^ftui.*=.*{.*path.*=.*"\/dp\//d' Cargo.toml
          sed -i 's/^tui = \["dep:ftui.*\]/tui = []/' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - name: Collect provenance
        run: |
          mkdir -p provenance
          echo "{" > provenance/ci-metadata.json
          echo "  \"git_sha\": \"${{ github.sha }}\"," >> provenance/ci-metadata.json
          echo "  \"git_ref\": \"${{ github.ref }}\"," >> provenance/ci-metadata.json
          echo "  \"run_id\": \"${{ github.run_id }}\"," >> provenance/ci-metadata.json
          echo "  \"run_number\": ${{ github.run_number }}," >> provenance/ci-metadata.json
          echo "  \"runner_os\": \"${{ runner.os }}\"," >> provenance/ci-metadata.json
          echo "  \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"," >> provenance/ci-metadata.json
          echo "  \"rustc_version\": \"$(rustc --version)\"," >> provenance/ci-metadata.json
          echo "  \"cargo_version\": \"$(cargo --version)\"" >> provenance/ci-metadata.json
          echo "}" >> provenance/ci-metadata.json
          cargo tree $CI_FEATURES --depth 1 > provenance/dependency-tree.txt
          cat provenance/ci-metadata.json
      - name: Upload provenance
        uses: actions/upload-artifact@v7.0.1
        with:
          name: provenance
          path: provenance/
          retention-days: 90
