name: Developer ID Certificate Expiration

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  developer-id-certificate:
    name: Check Developer ID certificate expiration
    runs-on: macos-latest
    env:
      APPLE_DEVELOPER_ID_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
      APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
    steps:
      - name: Check Developer ID certificate expiration
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${APPLE_DEVELOPER_ID_CERTIFICATE_P12_BASE64:-}" ] || [ -z "${APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD:-}" ]; then
            echo "::warning::Developer ID certificate secrets are not configured; expiration monitoring is inactive"
            exit 0
          fi

          cert_path="${RUNNER_TEMP}/sbh-developer-id.p12"
          pem_path="${RUNNER_TEMP}/sbh-developer-id.pem"
          warning_seconds=$((30 * 24 * 60 * 60))
          export CERT_PATH="${cert_path}"

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERT_PATH"]).write_bytes(
              base64.b64decode(os.environ["APPLE_DEVELOPER_ID_CERTIFICATE_P12_BASE64"])
          )
          PY

          openssl pkcs12 \
            -in "${cert_path}" \
            -clcerts \
            -nokeys \
            -passin "pass:${APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD}" \
            -out "${pem_path}"

          not_after="$(openssl x509 -in "${pem_path}" -noout -enddate | cut -d= -f2-)"
          echo "Developer ID certificate expires at: ${not_after}"

          if ! openssl x509 -in "${pem_path}" -checkend 0 -noout; then
            echo "::error::Developer ID certificate has expired: ${not_after}"
            exit 1
          fi

          if ! openssl x509 -in "${pem_path}" -checkend "${warning_seconds}" -noout; then
            echo "::warning::Developer ID certificate expires within 30 days: ${not_after}"
            exit 0
          fi

          echo "Developer ID certificate is valid for more than 30 days."
