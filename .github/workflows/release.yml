name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings
  # TUI feature depends on local-path frankentui crates unavailable in CI.
  CI_FEATURES: --no-default-features --features cli,daemon,sqlite

permissions:
  contents: write

jobs:
  quality-gate:
    name: Quality Gate
    uses: ./.github/workflows/ci.yml

  homebrew-tap-deploy-key-preflight:
    name: Homebrew Tap Deploy Key Preflight
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_REPOSITORY: git@github.com:Dicklesworthstone/homebrew-sbh.git
      HOMEBREW_TAP_SSH_KEY: ${{ secrets.HOMEBREW_TAP_SSH_KEY }}
    steps:
      - name: Validate tap deploy key before release work
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_SSH_KEY:-}" ]; then
            echo "::error::HOMEBREW_TAP_SSH_KEY is required before release artifacts are built"
            exit 1
          fi
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          key_path="${RUNNER_TEMP}/sbh-homebrew-tap-key"
          printf '%s\n' "${HOMEBREW_TAP_SSH_KEY}" > "${key_path}"
          chmod 600 "${key_path}"
          ssh-keygen -y -f "${key_path}" > homebrew-tap-deploy-key.pub
          ssh-keyscan github.com >> "${HOME}/.ssh/known_hosts"
          export GIT_SSH_COMMAND="ssh -i ${key_path} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"

          git ls-remote --symref "${HOMEBREW_TAP_REPOSITORY}" HEAD > homebrew-tap-head.txt
          grep -F $'ref: refs/heads/main\tHEAD' homebrew-tap-head.txt

          git init homebrew-tap-preflight
          cd homebrew-tap-preflight
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          printf 'sbh deploy key preflight\n' > README.md
          git add README.md
          git commit -m "Validate sbh tap deploy key"
          git push --dry-run "${HOMEBREW_TAP_REPOSITORY}" HEAD:refs/heads/sbh-deploy-key-preflight-${GITHUB_RUN_ID}

  build:
    name: Build (${{ matrix.target }})
    needs: [quality-gate, homebrew-tap-deploy-key-preflight]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.xz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.xz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: tar.xz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.xz
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Strip local-only TUI path deps
        run: |
          # ftui crates use /dp/frankentui/ paths unavailable in CI
          # Use perl for cross-platform compat (macOS sed -i requires different syntax)
          perl -i -ne 'print unless /^ftui.*=.*\{.*path.*=.*"\/dp\//' Cargo.toml
          perl -i -pe 's/^tui = \["dep:ftui.*\]/tui = []/' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (if needed)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build $CI_FEATURES --release --target ${{ matrix.target }}
          else
            cargo build $CI_FEATURES --release --target ${{ matrix.target }}
          fi

      - name: Import Developer ID certificate
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_IDENTITY }}
        run: |
          set -euo pipefail

          for secret_name in APPLE_DEVELOPER_ID_CERTIFICATE_P12_BASE64 APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD APPLE_DEVELOPER_ID_IDENTITY; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::${secret_name} is required for macOS Developer ID signing"
              exit 1
            fi
          done

          cert_path="${RUNNER_TEMP}/sbh-developer-id.p12"
          keychain="${RUNNER_TEMP}/sbh-release-signing.keychain-db"
          keychain_password="$(uuidgen)-$(uuidgen)"
          export CERT_PATH="${cert_path}"

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERT_PATH"]).write_bytes(
              base64.b64decode(os.environ["APPLE_DEVELOPER_ID_CERTIFICATE_P12_BASE64"])
          )
          PY

          security create-keychain -p "${keychain_password}" "${keychain}"
          security set-keychain-settings -lut 21600 "${keychain}"
          security unlock-keychain -p "${keychain_password}" "${keychain}"
          security import "${cert_path}" \
            -k "${keychain}" \
            -P "${APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${keychain_password}" \
            "${keychain}"

          existing_keychains="$(security list-keychains -d user | tr -d '\"' || true)"
          security list-keychains -d user -s "${keychain}" ${existing_keychains}
          identity_list="sbh-${{ matrix.target }}-identity-list.txt"
          security find-identity -v -p codesigning "${keychain}" | tee "${identity_list}"
          if ! grep -Fq "${APPLE_DEVELOPER_ID_IDENTITY}" "${identity_list}"; then
            echo "::error::APPLE_DEVELOPER_ID_IDENTITY was not found in the imported Developer ID keychain"
            exit 1
          fi

      - name: Sign macOS release binary with Developer ID and hardened runtime
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        env:
          APPLE_DEVELOPER_ID_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_IDENTITY }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_DEVELOPER_ID_IDENTITY:-}" ]; then
            echo "::error::APPLE_DEVELOPER_ID_IDENTITY is required for macOS Developer ID signing"
            exit 1
          fi

          bin="target/${{ matrix.target }}/release/sbh"
          entitlements=".github/macos/sbh.entitlements.plist"
          test -x "${bin}"
          plutil -lint "${entitlements}"
          codesign --force \
            --sign "${APPLE_DEVELOPER_ID_IDENTITY}" \
            --options runtime \
            --timestamp \
            --entitlements "${entitlements}" \
            "${bin}"
          codesign --verify --strict --verbose=2 "${bin}"
          codesign --display --verbose=4 "${bin}"
          codesign --display --entitlements :- "${bin}" > "sbh-${{ matrix.target }}-entitlements.plist"
          plutil -lint "sbh-${{ matrix.target }}-entitlements.plist"
          if grep -E 'com\.apple\.security\.(cs\.allow-jit|cs\.disable-library-validation|network\.server|device\.camera|device\.microphone)' "sbh-${{ matrix.target }}-entitlements.plist"; then
            echo "::error::sbh release binary was signed with a forbidden entitlement"
            exit 1
          fi

      - name: Notarize macOS release binary
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        env:
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/sbh"
          upload="sbh-${{ matrix.target }}-notary.zip"
          submit_plist="sbh-${{ matrix.target }}-notary-submit.plist"
          info_plist="sbh-${{ matrix.target }}-notary-info.plist"
          log_json="sbh-${{ matrix.target }}-notary-log.json"

          for secret_name in APPLE_NOTARY_KEY_P8_BASE64 APPLE_NOTARY_KEY_ID APPLE_NOTARY_ISSUER_ID; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::${secret_name} is required for macOS notarization"
              exit 1
            fi
          done

          test -x "${bin}"
          codesign --display --verbose=4 "${bin}" > "sbh-${{ matrix.target }}-codesign-authority.txt" 2>&1
          cat "sbh-${{ matrix.target }}-codesign-authority.txt"
          if ! grep -q 'Authority=Developer ID Application' "sbh-${{ matrix.target }}-codesign-authority.txt"; then
            echo "::error::Developer ID Application signing is required before notarization"
            exit 1
          fi

          notary_key="${RUNNER_TEMP}/sbh-notary-api-key.p8"
          export NOTARY_KEY_PATH="${notary_key}"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["NOTARY_KEY_PATH"]).write_bytes(
              base64.b64decode(os.environ["APPLE_NOTARY_KEY_P8_BASE64"])
          )
          PY
          chmod 600 "${notary_key}"
          if ! grep -q "BEGIN PRIVATE KEY" "${notary_key}"; then
            echo "::error::APPLE_NOTARY_KEY_P8_BASE64 did not decode to an App Store Connect private key"
            exit 1
          fi

          notary_args=(
            --key "${notary_key}"
            --key-id "${APPLE_NOTARY_KEY_ID}"
            --issuer "${APPLE_NOTARY_ISSUER_ID}"
          )

          ditto -c -k --keepParent "${bin}" "${upload}"
          xcrun notarytool submit "${upload}" "${notary_args[@]}" --output-format plist > "${submit_plist}"

          submission_id="$(plutil -extract id raw -o - "${submit_plist}")"
          if [ -z "${submission_id}" ]; then
            echo "::error::notarytool did not return a submission id"
            cat "${submit_plist}"
            exit 1
          fi

          deadline=$((SECONDS + 1800))
          status=""
          while [ "${SECONDS}" -lt "${deadline}" ]; do
            xcrun notarytool info "${submission_id}" "${notary_args[@]}" --output-format plist > "${info_plist}"
            status="$(plutil -extract status raw -o - "${info_plist}")"
            case "${status}" in
              Accepted)
                break
                ;;
              Invalid|Rejected)
                xcrun notarytool log "${submission_id}" "${notary_args[@]}" "${log_json}" || true
                cat "${log_json}" || true
                echo "::error::notarization ${status} for ${submission_id}"
                exit 1
                ;;
            esac
            sleep 30
          done

          if [ "${status}" != "Accepted" ]; then
            xcrun notarytool log "${submission_id}" "${notary_args[@]}" "${log_json}" || true
            cat "${log_json}" || true
            echo "::error::notarization timed out after 30 minutes for ${submission_id}"
            exit 1
          fi

          xcrun notarytool log "${submission_id}" "${notary_args[@]}" "${log_json}" || true
          cat "${log_json}" || true
          expected_cdhash="$(awk -F= '/^CDHash=/ {print $2; exit}' "sbh-${{ matrix.target }}-codesign-authority.txt")"
          expected_arch="${{ matrix.target }}"
          case "${expected_arch}" in
            aarch64-apple-darwin)
              expected_arch="arm64"
              ;;
            x86_64-apple-darwin)
              expected_arch="x86_64"
              ;;
          esac
          EXPECTED_CDHASH="${expected_cdhash}" EXPECTED_ARCH="${expected_arch}" NOTARY_LOG_JSON="${log_json}" python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          log_path = Path(os.environ["NOTARY_LOG_JSON"])
          report = json.loads(log_path.read_text(encoding="utf-8"))
          if report.get("status") != "Accepted":
              print(f"::error::notary log status was not Accepted: {report.get('status')}")
              sys.exit(1)
          if report.get("issues") not in (None, []):
              print(f"::error::notary log contained issues: {report.get('issues')}")
              sys.exit(1)

          expected_cdhash = os.environ["EXPECTED_CDHASH"].lower()
          expected_arch = os.environ["EXPECTED_ARCH"]
          ticket_contents = report.get("ticketContents")
          if not isinstance(ticket_contents, list):
              print("::error::notary log ticketContents was not an array")
              sys.exit(1)

          for ticket in ticket_contents:
              if not isinstance(ticket, dict):
                  continue
              if ticket.get("arch") == expected_arch and str(ticket.get("cdhash", "")).lower() == expected_cdhash:
                  break
          else:
              print(
                  "::error::notary log did not contain the signed binary ticket "
                  f"for arch={expected_arch} cdhash={expected_cdhash}"
              )
              sys.exit(1)
          PY

      - name: Package archive
        run: |
          cd target/${{ matrix.target }}/release
          # Artifact naming contract: sbh-{tag}-{target}.tar.xz
          # The installer script (scripts/install.sh) expects this exact format.
          ARCHIVE_NAME="sbh-${GITHUB_REF_NAME}-${{ matrix.target }}.${{ matrix.archive }}"
          tar cJf "../../../${ARCHIVE_NAME}" sbh
          cd ../../..
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"
          else
            shasum -a 256 "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sbh-${{ matrix.target }}
          path: |
            sbh-*.tar.xz
            sbh-*.sha256
            sbh-*-notary-*.plist
            sbh-*-notary-*.json
            sbh-*-codesign-authority.txt

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable

      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate release checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifacts
          checksum_files=(sbh-*.sha256)
          if [ "${checksum_files[0]}" = "sbh-*.sha256" ]; then
            echo "::error::no release checksum sidecars were downloaded"
            exit 1
          fi

          : > ../SHA256SUMS.txt
          for checksum_file in "${checksum_files[@]}"; do
            archive="${checksum_file%.sha256}"
            if [ ! -s "${archive}" ]; then
              echo "::error::missing archive for checksum sidecar: ${checksum_file}"
              exit 1
            fi

            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum -c "${checksum_file}"
            else
              shasum -a 256 -c "${checksum_file}"
            fi
            awk '{print $1 "  " $2}' "${checksum_file}" >> ../SHA256SUMS.txt
          done

          sort -k2,2 ../SHA256SUMS.txt -o ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt

      - name: Collect provenance
        run: |
          echo "{" > release-provenance.json
          echo "  \"tag\": \"${GITHUB_REF_NAME}\"," >> release-provenance.json
          echo "  \"sha\": \"${{ github.sha }}\"," >> release-provenance.json
          echo "  \"run_id\": \"${{ github.run_id }}\"," >> release-provenance.json
          echo "  \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"," >> release-provenance.json
          echo "  \"rustc_version\": \"$(rustc --version)\"" >> release-provenance.json
          echo "}" >> release-provenance.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: true
          files: |
            release-artifacts/sbh-*.tar.xz
            release-artifacts/sbh-*.sha256
            SHA256SUMS.txt
            release-provenance.json

  homebrew-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_REPOSITORY: git@github.com:Dicklesworthstone/homebrew-sbh.git
      HOMEBREW_TAP_SLUG: Dicklesworthstone/homebrew-sbh
      HOMEBREW_TAP_SSH_KEY: ${{ secrets.HOMEBREW_TAP_SSH_KEY }}
    steps:
      - name: Validate tap deploy key
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_SSH_KEY:-}" ]; then
            echo "::error::HOMEBREW_TAP_SSH_KEY is required to update ${HOMEBREW_TAP_SLUG}"
            exit 1
          fi
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          key_path="${RUNNER_TEMP}/sbh-homebrew-tap-key"
          printf '%s\n' "${HOMEBREW_TAP_SSH_KEY}" > "${key_path}"
          chmod 600 "${key_path}"
          ssh-keygen -y -f "${key_path}" > homebrew-tap-deploy-key.pub
          ssh-keyscan github.com >> "${HOME}/.ssh/known_hosts"
          export GIT_SSH_COMMAND="ssh -i ${key_path} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"

          git ls-remote --symref "${HOMEBREW_TAP_REPOSITORY}" HEAD > homebrew-tap-head.txt
          grep -F $'ref: refs/heads/main\tHEAD' homebrew-tap-head.txt

          git init homebrew-tap-write-check
          cd homebrew-tap-write-check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          printf 'sbh deploy key preflight\n' > README.md
          git add README.md
          git commit -m "Validate sbh tap deploy key"
          git push --dry-run "${HOMEBREW_TAP_REPOSITORY}" HEAD:refs/heads/sbh-deploy-key-preflight-${GITHUB_RUN_ID}

      - name: Check out source repository
        uses: actions/checkout@v6.0.2
        with:
          path: sbh-source

      - name: Check out Homebrew tap
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ env.HOMEBREW_TAP_SLUG }}
          ssh-key: ${{ secrets.HOMEBREW_TAP_SSH_KEY }}
          path: homebrew-sbh

      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate tap formula
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          arm_sha_file="release-artifacts/sbh-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.xz.sha256"
          intel_sha_file="release-artifacts/sbh-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.xz.sha256"

          for checksum_file in "${arm_sha_file}" "${intel_sha_file}"; do
            if [ ! -s "${checksum_file}" ]; then
              echo "::error::missing macOS release checksum: ${checksum_file}"
              exit 1
            fi
          done

          arm_sha="$(awk '{print $1}' "${arm_sha_file}")"
          intel_sha="$(awk '{print $1}' "${intel_sha_file}")"
          for checksum in "${arm_sha}" "${intel_sha}"; do
            if ! printf '%s' "${checksum}" | grep -Eq '^[0-9a-fA-F]{64}$'; then
              echo "::error::invalid SHA-256 checksum in macOS release artifacts"
              exit 1
            fi
          done

          mkdir -p homebrew-sbh/Formula
          cp sbh-source/packaging/homebrew/Formula/sbh.rb homebrew-sbh/Formula/sbh.rb
          VERSION="${version}" ARM_SHA="${arm_sha}" INTEL_SHA="${intel_sha}" \
            perl -0pi -e '
              s/version "[^"]+"/version "$ENV{VERSION}"/;
              s/      # REPLACE_WITH_AARCH64_APPLE_DARWIN_SHA256\n      sha256 "[0-9a-f]{64}"/      sha256 "$ENV{ARM_SHA}"/g;
              s/      # REPLACE_WITH_X86_64_APPLE_DARWIN_SHA256\n      sha256 "[0-9a-f]{64}"/      sha256 "$ENV{INTEL_SHA}"/g;
            ' homebrew-sbh/Formula/sbh.rb

          if grep -q 'REPLACE_WITH_' homebrew-sbh/Formula/sbh.rb; then
            echo "::error::generated Homebrew formula still contains placeholder checksums"
            exit 1
          fi
          ruby -c homebrew-sbh/Formula/sbh.rb

      - name: Publish Homebrew formula update
        shell: bash
        run: |
          set -euo pipefail
          cd homebrew-sbh
          git fetch origin main
          git checkout -B main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/sbh.rb

          if git diff --cached --quiet; then
            echo "Homebrew formula is already current for ${GITHUB_REF_NAME}"
            exit 0
          fi

          git commit -m "Update sbh formula for ${GITHUB_REF_NAME}"
          git push origin HEAD:main
